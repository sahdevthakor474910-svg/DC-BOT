[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "dc-bot"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/"

# ── Persistent volume ────────────────────────────────────────────────────────
# Mount a Railway Volume at /data so bot.db survives every redeploy.
# In the Railway dashboard you MUST create a Volume named "data" and
# attach it to this service with the mount path "/data".
[[volumes]]
name   = "data"
mountPath = "/data"
