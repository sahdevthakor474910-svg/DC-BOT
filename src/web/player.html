<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player - {title}</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #181824 0%, #0b0b10 100%);
            color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 960px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 2;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }
        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: #ff2a5f;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .logo span {
            color: #ffffff;
        }
        .title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Main Player Card -->
    <div class="container">
        <div class="header">
            <div class="logo">🎥 DC<span>BOT</span> Player</div>
            <div class="title" id="videoTitle">{title}</div>
        </div>
        <div class="player-wrapper">
            <video id="webVideo" controls autoplay preload="metadata" playsinline>
                <source src="{stream_url}" type="video/mp4">
                Your browser does not support the HTML5 video tag.
            </video>
        </div>
    </div>

    <script>
        // Autofocus the video and attempt to play automatically on load
        window.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('webVideo');
            if (video) {
                video.focus();
                video.play().catch(err => {
                    console.log("Autoplay blocked by browser. User must click play.", err);
                });
            }
        });
    </script>
</body>
</html>
